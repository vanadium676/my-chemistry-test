<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bronze Clicker Game</title>
    <style>
        /* Весь дизайн здесь */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
            font-family: 'Arial Black', sans-serif;
            color: white;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            transition: all 0.5s ease;
        }

        .score-board {
            font-size: 48px;
            margin-bottom: 20px;
            color: #cd7f32; /* Бронзовый цвет */
            text-shadow: 0 0 10px rgba(205, 127, 50, 0.5);
        }

        #click-me {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid #cd7f32;
            background: transparent;
            color: #cd7f32;
            font-size: 20px;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.2);
        }

        #click-me:active {
            transform: scale(0.9);
            background: rgba(205, 127, 50, 0.1);
        }

        /* Экран победы */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .congrats {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }

        .bronze-title {
            font-size: 50px;
            color: #cd7f32;
            text-transform: uppercase;
            text-shadow: 0 0 20px #cd7f32;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .restart-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">Очки: <span id="score">0</span></div>
        <p>Нужно 50 для победы!</p>
        <button id="click-me" onclick="handleClick()">ЖМИ!</button>
    </div>

    <div id="victory-screen">
        <div class="congrats">ПОЗДРАВЛЯЕМ! ТЫ СДЕЛАЛ ЭТО!</div>
        <div class="bronze-title">БАЙТАК РЕСПА БРОНЗАВ</div>
        <button class="restart-btn" onclick="resetGame()">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        let score = 0;
        const target = 50;

        function handleClick() {
            score++;
            document.getElementById('score').innerText = score;

            if (score >= target) {
                showVictory();
            }
        }

        function showVictory() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('victory-screen').style.display = 'none';
        }
    </script>

</body>
</html>
